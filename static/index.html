<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RAG-powered chatbot for querying financial fraud documents with an interactive PDF viewer.">
    <title>JERUSH AI — Document Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- Top Navigation Bar -->
    <nav id="navbar">
        <div class="nav-left">
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="url(#grad1)" opacity="0.9"/>
                    <path d="M2 17L12 22L22 17" stroke="url(#grad2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="url(#grad2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="grad1" x1="2" y1="2" x2="22" y2="12">
                            <stop offset="0%" stop-color="#6366f1"/>
                            <stop offset="100%" stop-color="#a855f7"/>
                        </linearGradient>
                        <linearGradient id="grad2" x1="2" y1="12" x2="22" y2="22">
                            <stop offset="0%" stop-color="#6366f1"/>
                            <stop offset="100%" stop-color="#a855f7"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1 class="nav-title">JERUSH <span class="accent">AI</span></h1>
        </div>
        <div class="nav-center">
            <span class="nav-badge">
                <span class="pulse-dot"></span>
                RAG-Powered Document Intelligence
            </span>
        </div>
        <div class="nav-right">
            <span class="model-badge">Llama 3.3 70B</span>
            <span class="status-indicator online" id="status-indicator">Online</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content">

        <!-- Left Panel: PDF Viewer -->
        <section id="pdf-panel" class="panel">
            <div class="panel-header">
                <div class="panel-header-left">
                    <svg class="panel-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                    <h2>Document Viewer</h2>
                </div>
                <span class="file-name-badge">fighting-fraud-in-financial-services.pdf</span>
            </div>
            <div class="pdf-container">
                <iframe id="pdf-viewer" src="/pdf" title="PDF Viewer"></iframe>
            </div>
        </section>

        <!-- Resize Handle -->
        <div id="resize-handle" title="Drag to resize panels">
            <div class="handle-dots">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Right Panel: Chatbot -->
        <section id="chat-panel" class="panel">
            <div class="panel-header">
                <div class="panel-header-left">
                    <svg class="panel-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <h2>AI Assistant</h2>
                </div>
                <button id="clear-chat-btn" class="clear-btn" title="Clear conversation">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                    Clear
                </button>
            </div>

            <div id="chat-messages" class="chat-messages">
                <!-- Welcome Message -->
                <div class="message bot-message welcome-message">
                    <div class="message-avatar bot-avatar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5"/>
                            <path d="M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <div class="message-content">
                        <div class="message-header">
                            <span class="message-sender">JERUSH AI</span>
                            <span class="message-time" id="welcome-time"></span>
                        </div>

                    </div>
                </div>
            </div>

            <!-- Chat Input -->
            <div id="chat-input-container" class="chat-input-container">
                <div class="input-wrapper">
                    <textarea 
                        id="chat-input" 
                        placeholder="Ask anything about the document..." 
                        rows="1"
                        autofocus
                    ></textarea>
                    <button id="send-btn" class="send-btn" title="Send message" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
               
            </div>
        </section>

    </main>

    <script src="/static/script.js"></script>
</body>
</html>
